syntax = "proto3";

package gemstone_pqdif;

// Modos de extracción
enum ExtractionMode {
  RAW = 0;       // Muestras originales (zoom profundo)
  MIN_MAX = 1;   // Envolvente (pares mínimo/máximo por cubeta)
}

message ChannelSummary {
  int32 channel_index = 1;
  string channel_name = 2;
  string phase = 3;
  string quantity_type = 4;
}

message ObservationSummary {
  int32 observation_index = 1;
  string observation_name = 2;
  string start_time = 3;
  repeated ChannelSummary channels = 4;
  string disturbance_category = 5;
  string disturbance_description = 6;
  string time_triggered = 7;
}

message FileMetadataResponse {
  bool is_success = 1;
  string error_message = 2;
  string file_name = 3;
  string equipment_model = 4;
  string manufacturer = 5;
  repeated ObservationSummary observations = 6;
}

message FaultEvent {
  string event_type = 1;
  double magnitude = 2;
  double duration_ms = 3;
  int32 channel_index = 4;
  int32 start_index = 5;
  int32 end_index = 6;
  string description = 7;
}

// Petición de ventana de series
message SeriesWindowRequest {
  int32 observation_index = 1; // Índice del registro de observación
  repeated int32 channel_indices = 2;     // Índice del canal dentro de la observación
  int32 start_index = 3;       // Punto de inicio de la ventana solicitada
  int32 end_index = 4;         // Punto final de la ventana
  int32 target_points = 5;     // Número de puntos deseados en la UI
}

message ChannelData {
  int32 channel_index = 1;
  bytes samples_binary = 2;
}

// Respuesta de ventana de series
message SeriesWindowResponse {
  bool is_success = 1;
  string error_message = 2;
  ExtractionMode mode = 3;     // Enum para indicar si los datos son originales o procesados
  int32 bucket_size = 4;       // El factor de decimación calculado y aplicado por el motor
  repeated ChannelData channel_data = 5;    // Contendrá el buffer de double (Float64) serializado como bytes crudos
  repeated FaultEvent faults = 6;
}
