syntax = "proto3";

package gemstone_pqdif;

message ChannelDefinition {
  int32 channel_id = 1;
  string name = 2;
  int32 quantity_type = 3;
  int32 quantity_units = 4;
  double nominal_value = 5;
}

message WriteInitRequest {
  string file_path = 1;
  string equipment_name = 2;
  string vendor_name = 3;
  repeated ChannelDefinition channels = 4;
}

message WriteChannelData {
  int32 channel_id = 1;
  bytes data_raw = 2;
}

message WriteObservationRequest {
  int64 timestamp_ms = 1;
  repeated WriteChannelData samples = 2;
}

message WriteResponse {
  bool is_success = 1;
  string error_message = 2;
  bytes file_result = 3;
}
